openapi: 3.1.0
info:
  title: Dakinis Media Player API
  version: 0.1.0
  description: Referencia — ver docs/API.md
servers:
  - url: https://api.dakinissystems.com/akoenet/media
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: OK
  /tracks:
    get:
      summary: List user tracks
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Track list
    post:
      summary: Register track metadata
      security: [{ bearerAuth: [] }]
      responses:
        "201":
          description: Created
  /playlists:
    get:
      summary: List playlists
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Playlist list
  /rooms:
    post:
      summary: Create listening room
      security: [{ bearerAuth: [] }]
      responses:
        "201":
          description: Room created
  /skins:
    get:
      summary: List skins
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Skin catalog
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
