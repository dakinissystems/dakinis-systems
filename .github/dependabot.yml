    open-pull-requests-limit: 3
    labels:
      - dependencies
      - security

  - package-ecosystem: npm
    directory: /packages
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - security
