name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Prepare compose env (stub)
        run: |
          cp docker/.env.example docker/.env
          cp docker/.env.dev.example docker/.env.dev

      - name: Validate docker compose
        working-directory: docker
        run: docker compose -f compose.full.yml config

      - name: Lint nginx config
        run: |
          # Resolución stub: nginx -t resuelve upstreams a tiempo de carga; sin red Docker
          # deben existir nombres (p. ej. auth) o falla. --add-host evita el falso negativo.
          docker run --rm \
            --add-host=auth:127.0.0.1 \
            --add-host=core-api:127.0.0.1 \
            --add-host=streamautomator-api:127.0.0.1 \
            --add-host=akoenet-backend:127.0.0.1 \
            --add-host=fitness-platform-api:127.0.0.1 \
            -v "${{ github.workspace }}/gateway/nginx.conf:/etc/nginx/nginx.conf:ro" \
            -v "${{ github.workspace }}/gateway/routes:/etc/nginx/routes:ro" \
            nginx:1.27-alpine nginx -t

      - name: Build stack images (full workspace only)
        working-directory: docker
        run: |
          if [ -d ../platform/auth ] && [ -d ../apps/streamautomator ] && [ -d ../platform/core ]; then
            docker compose -f compose.full.yml build
          else
            echo 'Skipping docker compose build: platform/ and apps/ are not in this checkout (control-repo layout).'
          fi

      - name: AkoeNet Client — Vite build
        if: hashFiles('apps/akoenet/Client/package.json') != ''
        working-directory: apps/akoenet/Client
        run: |
          npm ci
          npm run build

      - name: Core — API build smoke
        if: hashFiles('platform/core/package.json') != ''
        working-directory: platform/core
        run: |
          npm install
          npm run build

      - name: Auth — syntax check
        if: hashFiles('platform/auth/package.json') != ''
        working-directory: platform/auth
        run: |
          npm install --omit=dev
          node --check src/app.js

  security-audit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: akoenet-client
            path: apps/akoenet/Client
          - name: akoenet-server
            path: apps/akoenet/Server
          - name: dakinis-auth
            path: platform/auth
          - name: dakinis-core
            path: platform/core
          - name: fitness-platform
            path: apps/fitness-platform
          - name: landing
            path: apps/landing
          - name: streamautomator-web
            path: apps/streamautomator/apps/web
          - name: streamautomator-api
            path: apps/streamautomator/apps/api
            optional: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: npm audit (${{ matrix.name }})
        continue-on-error: ${{ matrix.optional == true }}
        run: |
          # apps/ and platform/ are not in the control-repo checkout (.gitignore); skip missing paths.
          if [ ! -f "${{ matrix.path }}/package.json" ]; then
            echo "skip: ${{ matrix.path }} not present in this repository (clone the product repo for a full audit)."
            exit 0
          fi
          cd "${{ matrix.path }}"
          if [ -f package-lock.json ]; then
            npm ci --omit=dev
          else
            npm i --package-lock-only --omit=dev
            npm ci --omit=dev
          fi
          npm audit --omit=dev --audit-level=high
