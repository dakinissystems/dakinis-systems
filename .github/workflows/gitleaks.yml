# Secret scan without GitHub Advanced Security (org has no GHAS).
# Uses Gitleaks CLI (no gitleaks-action org license required).
# Canonical reusable: dakinissystems/dakinis-systems/.github/workflows/gitleaks-reusable.yml
# Sync: node scripts/sync-gitleaks-workflow.mjs (from dakinis-systems)

name: Gitleaks

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

concurrency:
  group: gitleaks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scan:
    name: secret-scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        env:
          GITLEAKS_VERSION: "8.24.2"
        run: |
          set -euo pipefail
          curl -sSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          chmod +x /usr/local/bin/gitleaks
          gitleaks version

      - name: Run Gitleaks
        run: |
          set -euo pipefail
          args=(detect --source . --verbose --redact --exit-code 1)
          if [ -f .gitleaks.toml ]; then
            args+=(--config .gitleaks.toml)
            echo "Using .gitleaks.toml"
          fi
          gitleaks "${args[@]}"
