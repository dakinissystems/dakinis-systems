# Stack completo — desde docker/:
#   docker compose -f compose.full.yml -f compose.dev.yml up --build
#   (solo full) docker compose -f compose.full.yml up --build
#
# Rutas relativas a docker/ → ../platform, ../apps, ../gateway.
# Interpolación: docker/.env debe definir ENV (dev|prod) para resolver env_file de servicios.

services:
  postgres:
    image: postgres:15
    container_name: dakinis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dakinis
      POSTGRES_PASSWORD: dakinis
      POSTGRES_DB: dakinis
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dakinis -d dakinis"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks: [dakinis]

  redis:
    image: redis:7
    container_name: dakinis-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks: [dakinis]

  auth:
    build:
      context: ../platform/auth
      dockerfile: Dockerfile
    container_name: dakinis-auth
    restart: unless-stopped
    env_file:
      - .env.${ENV:-dev}
    environment:
      DATABASE_URL: ${DATABASE_URL_AUTH:-postgres://dakinis:dakinis@postgres:5432/dakinis}
      PORT: "4000"
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:4000/auth/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [dakinis]

  core-api:
    build:
      context: ../platform/core
      dockerfile: Dockerfile.api
    container_name: dakinis-core-api
    restart: unless-stopped
    env_file:
      - .env.${ENV:-dev}
    environment:
      PORT: "4001"
      SQLITE_PATH: /app/data/dakinis.db
      # Mismo SPA Vite habitual; evita clash de FRONTEND_URL compartido vía env_file.
      FRONTEND_URL: http://localhost:5173
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "4001:4001"
    volumes:
      - core_sqlite:/app/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:4001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [dakinis]

  streamautomator-api:
    build:
      context: ../apps/streamautomator/apps/api
      dockerfile: Dockerfile
    container_name: dakinis-streamautomator-api
    restart: unless-stopped
    env_file:
      - .env.${ENV:-dev}
    environment:
      PORT: "4002"
      DATABASE_URL: ${DATABASE_URL_STREAMAUTOMATOR:-postgres://dakinis:dakinis@postgres:5432/dakinis_stream}
      REDIS_URL: redis://redis:6379
      TRUST_GATEWAY_IDENTITY_HEADERS: "true"
      FRONTEND_URL: http://localhost:3000
    ports:
      - "4002:4002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      auth:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:4002/api/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks: [dakinis]

  akoenet-backend:
    build:
      context: ../apps/akoenet/Server
      dockerfile: Dockerfile
    container_name: dakinis-akoenet-backend
    restart: unless-stopped
    env_file:
      - .env.${ENV:-dev}
    environment:
      PORT: "4003"
      DATABASE_URL: ${DATABASE_URL_AKOENET:-postgres://dakinis:dakinis@postgres:5432/akoenet}
      REDIS_URL: redis://redis:6379
      PUBLIC_API_URL: http://localhost:4003
      FRONTEND_URL: http://localhost:5173
      # Server→server dentro de la red Docker (no usar localhost desde el contenedor).
      SCHEDULER_API_BASE_URL: http://streamautomator-api:4002
    ports:
      - "4003:4003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      auth:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:4003/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks: [dakinis]

  gateway:
    image: nginx:1.27-alpine
    container_name: dakinis-gateway
    restart: unless-stopped
    ports:
      - "80:80"
    tmpfs:
      - /var/cache/nginx/auth
    volumes:
      - ../gateway/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../gateway/routes:/etc/nginx/routes:ro
    depends_on:
      auth:
        condition: service_healthy
      core-api:
        condition: service_healthy
      streamautomator-api:
        condition: service_healthy
      akoenet-backend:
        condition: service_healthy
    networks: [dakinis]

volumes:
  postgres_data:
  core_sqlite:

networks:
  dakinis:
    driver: bridge
