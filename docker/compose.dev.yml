# Overlays de desarrollo — fusionar con compose.full.yml:
#   docker compose -f compose.full.yml -f compose.dev.yml up --build
#
# Publica puertos en el host para depurar servicios sin pasar por el gateway.

services:
  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  auth:
    ports:
      - "4000:4000"

  core-api:
    ports:
      - "4001:4001"

  streamautomator-api:
    ports:
      - "4002:4002"

  akoenet-backend:
    ports:
      - "4003:4003"

  fitness-platform-api:
    # Host 4090 — evita choque con billing standalone (:4080) u otro proceso en :4010
    ports:
      - "4090:4010"

  ai:
    ports:
      - "4020:4020"

  billing:
    ports:
      - "4080:8080"

  notifications:
    ports:
      - "4081:8080"

  search:
    ports:
      - "4082:8080"

  internal-api:
    ports:
      - "4083:8080"

  gateway:
    labels:
      - "dakinis.stack=full"
      - "dakinis.environment=development"
    ports:
      - "80:80"
    volumes:
      - ../gateway/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../gateway/routes:/etc/nginx/routes:ro
      # Sobrescribe resolver Railway → DNS embebido Docker (fix 502 en /billing/, /ai/, etc.)
      - ./nginx/resolver.local.conf:/etc/nginx/routes/resolver.conf:ro
