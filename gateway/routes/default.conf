map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name localhost;

    client_max_body_size 50m;

    # --- Auth (Express mounts routes under /auth on the service)
    location /auth/ {
        proxy_pass http://auth:4000/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Core API (paths are /api/* on the service)
    location /core/ {
        rewrite ^/core/(.*)$ /$1 break;
        proxy_pass http://core-api:4001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- StreamAutomator API (paths are /api/* on the service)
    location /streamautomator/ {
        rewrite ^/streamautomator/(.*)$ /$1 break;
        proxy_pass http://streamautomator-api:4002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # AkoeNet Swagger redirects to /docs/ — avoid 404 without trailing slash.
    location = /akoenet/docs {
        return 302 /akoenet/docs/;
    }

    # --- AkoeNet (HTTP + Socket.IO)
    location /akoenet/ {
        rewrite ^/akoenet/(.*)$ /$1 break;
        proxy_pass http://akoenet-backend:4003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location = / {
        default_type text/plain;
        return 200 'Dakinis gateway — try /auth/ /core/ /streamautomator/ /akoenet/\n';
    }
}
