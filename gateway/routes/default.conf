map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name localhost;

    # Railway: usa resolver privado interno para proxy_pass con variables.
    # resolver 127.0.0.11 ipv6=off valid=5s;  # Solo Docker Compose local
    resolver [fd12::10] ipv6=on valid=5s;

    client_max_body_size 100m;

    proxy_connect_timeout 2s;
    proxy_send_timeout 5s;
    proxy_read_timeout 5s;

    # railway.internal + puerto donde escucha el servicio ($PORT); private DNS no equivale a Kubernetes Service sin puerto — ver Railway private networking.
    # En Compose usar alias en compose.full.yml.
    set $u_auth dakinis-auth.railway.internal;
    set $u_core dakinis-core.railway.internal;
    # StreamAutomator: URL pública HTTPS (no private networking); proxy_pass https://$u_sa + Host $u_sa
    set $u_sa dakinis-streamautomator-production.up.railway.app;
    set $u_an akoenet-backend.railway.internal;
    set $u_fit fitness-platform-api.railway.internal;

    # StreamAutomator vía URL pública Railway (HTTPS); SNI requerido con proxy_pass y host en variable.
    proxy_ssl_server_name on;

    location = /_auth_check {
        internal;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;

        proxy_cache auth_cache;
        proxy_cache_key $sess_or_anon_key;
        proxy_cache_bypass $auth_cache_bypass_flag;
        proxy_no_cache $auth_cache_bypass_flag;
        proxy_cache_methods GET HEAD;
        proxy_cache_valid 200 15s;
        proxy_cache_valid 401 5s;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;

        proxy_pass http://$u_auth:4000/auth/verify;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Authorization $http_authorization;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 1;
    }

    #
    # StreamAutomator — rutas públicas SIN auth_request en el gateway (superficie sin Bearer).
    # Mantener alineado con app.js (antes de authenticateToken) + /api/streamer público + webhooks + OAuth.
    #
    location ^~ /streamautomator/api/health {
        rewrite ^/streamautomator/(.*)$ /$1 break;
        proxy_pass https://$u_sa;
        proxy_http_version 1.1;
        proxy_set_header Host $u_sa;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Integraciones: /api/integration/* (legacy) y /api/integrations/* (canónico en backend)
    location ~ ^/streamautomator/api/integration(s)?/ {
        rewrite ^/streamautomator/(.*)$ /$1 break;
        proxy_pass https://$u_sa;
        proxy_http_version 1.1;
        proxy_set_header Host $u_sa;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /streamautomator/api/webhooks/ {
        rewrite ^/streamautomator/(.*)$ /$1 break;
        proxy_pass https://$u_sa;
        proxy_http_version 1.1;
        proxy_set_header Host $u_sa;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /streamautomator/api/payments/webhook {
        proxy_pass https://$u_sa/api/payments/webhook;
        proxy_http_version 1.1;
        proxy_set_header Host $u_sa;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /streamautomator/api/csrf-token {
        proxy_pass https://$u_sa/api/csrf-token;
        proxy_http_version 1.1;
        proxy_set_header Host $u_sa;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /streamautomator/api/user/google-login {
        proxy_pass https://$u_sa/api/user/google-login;
        proxy_http_version 1.1;
        proxy_set_header Host $u_sa;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /streamautomator/api/user/auth/ {
        rewrite ^/streamautomator/(.*)$ /$1 break;
        proxy_pass https://$u_sa;
        proxy_http_version 1.1;
        proxy_set_header Host $u_sa;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /streamautomator/api/user/twitch/connect {
        rewrite ^/streamautomator/(.*)$ /$1 break;
        proxy_pass https://$u_sa;
        proxy_http_version 1.1;
        proxy_set_header Host $u_sa;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /streamautomator/api/user/twitch/callback {
        rewrite ^/streamautomator/(.*)$ /$1 break;
        proxy_pass https://$u_sa;
        proxy_http_version 1.1;
        proxy_set_header Host $u_sa;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /streamautomator/api/platforms/enabled {
        proxy_pass https://$u_sa/api/platforms/enabled;
        proxy_http_version 1.1;
        proxy_set_header Host $u_sa;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /streamautomator/api/streamer/ {
        rewrite ^/streamautomator/(.*)$ /$1 break;
        proxy_pass https://$u_sa;
        proxy_http_version 1.1;
        proxy_set_header Host $u_sa;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Todo lo bajo /api/public/* (incl. /api/public/streamer/* legacy)
    location ^~ /streamautomator/api/public/ {
        rewrite ^/streamautomator/(.*)$ /$1 break;
        proxy_pass https://$u_sa;
        proxy_http_version 1.1;
        proxy_set_header Host $u_sa;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /streamautomator/api-docs {
        rewrite ^/streamautomator/(.*)$ /$1 break;
        proxy_pass https://$u_sa;
        proxy_http_version 1.1;
        proxy_set_header Host $u_sa;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /streamautomator/admin {
        proxy_pass https://$u_sa/admin;
        proxy_http_version 1.1;
        proxy_set_header Host $u_sa;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /streamautomator/admin/ {
        proxy_pass https://$u_sa/admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $u_sa;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /streamautomator/ {
        proxy_pass https://$u_sa/;
        proxy_http_version 1.1;
        proxy_set_header Host $u_sa;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Auth
    location /auth/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin '*' always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Authorization, Content-Type' always;
            add_header Access-Control-Max-Age 86400 always;
            return 204;
        }
        add_header Access-Control-Allow-Origin '*' always;
        add_header Access-Control-Allow-Headers 'Authorization, Content-Type' always;
        add_header Access-Control-Allow-Credentials 'true' always;

        proxy_pass http://$u_auth:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Core API
    location /core/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin '*' always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Authorization, Content-Type' always;
            add_header Access-Control-Max-Age 86400 always;
            return 204;
        }
        add_header Access-Control-Allow-Origin '*' always;
        add_header Access-Control-Allow-Headers 'Authorization, Content-Type' always;
        add_header Access-Control-Allow-Credentials 'true' always;

        limit_req zone=api_limit burst=20 nodelay;

        auth_request /_auth_check;
        auth_request_set $auth_user $upstream_http_x_user_id;
        auth_request_set $auth_tenant $upstream_http_x_tenant_id;
        auth_request_set $auth_role $upstream_http_x_user_role;

        rewrite ^/core/(.*)$ /$1 break;
        proxy_pass http://$u_core:4001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-User-Id $auth_user;
        proxy_set_header X-Tenant-Id $auth_tenant;
        proxy_set_header X-User-Role $auth_role;
    }

    # --- StreamAutomator (resto del API: JWT en el borde + identidad + rate limit)
    location /streamautomator/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin '*' always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Authorization, Content-Type, X-Tenant-Id' always;
            add_header Access-Control-Max-Age 86400 always;
            return 204;
        }
        add_header Access-Control-Allow-Origin '*' always;
        add_header Access-Control-Allow-Headers 'Authorization, Content-Type, X-Tenant-Id' always;
        add_header Access-Control-Allow-Credentials 'true' always;

        limit_req zone=api_limit burst=20 nodelay;

        auth_request /_auth_check;
        auth_request_set $auth_user $upstream_http_x_user_id;
        auth_request_set $auth_tenant $upstream_http_x_tenant_id;
        auth_request_set $auth_role $upstream_http_x_user_role;

        rewrite ^/streamautomator/(.*)$ /$1 break;
        proxy_pass https://$u_sa;
        proxy_http_version 1.1;
        proxy_set_header Host $u_sa;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-User-Id $auth_user;
        proxy_set_header X-Tenant-Id $auth_tenant;
        proxy_set_header X-User-Role $auth_role;
    }

    location = /akoenet/docs {
        return 302 /akoenet/docs/;
    }

    # AkoeNet: auth en backend (Socket.IO + muchas rutas no bajo /api/)
    location /akoenet/ {
        rewrite ^/akoenet/(.*)$ /$1 break;
        proxy_pass http://$u_an:4003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # Fitness Platform — demo JWT en la app (sin auth_request aquí); ver docs/contracts/fitness-platform-api.json
    location ^~ /fitness/api/health {
        rewrite ^/fitness/(.*)$ /$1 break;
        proxy_pass http://$u_fit:4010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /fitness/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin '*' always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Authorization, Content-Type' always;
            add_header Access-Control-Max-Age 86400 always;
            return 204;
        }
        add_header Access-Control-Allow-Origin '*' always;
        add_header Access-Control-Allow-Headers 'Authorization, Content-Type' always;
        add_header Access-Control-Allow-Credentials 'true' always;

        rewrite ^/fitness/(.*)$ /$1 break;
        proxy_pass http://$u_fit:4010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        default_type application/json;
        return 200 '{"status":"ok","service":"gateway"}';
    }

    location = / {
        default_type text/plain;
        return 200 'Dakinis gateway — try /auth/ /core/ /streamautomator/ /akoenet/ /fitness/\n';
    }
}
