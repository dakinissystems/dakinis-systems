map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name localhost;

    # Railway: [fd12::10] · Docker local: compose.dev monta resolver.conf → 127.0.0.11
    include /etc/nginx/routes/resolver.conf;

    client_max_body_size 100m;

    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    # Producción Railway: productos vía dominio público (proxy_pass literal, sin variable).
    # Los upstreams HTTPS con $variable + resolver devolvían 504; platform usa *.railway.internal HTTP.
    set $u_auth_host auth.dakinissystems.com;
    set $u_core_host dakinis-core-production.up.railway.app;
    set $u_sa_host api.streamautomator.com;
    set $u_an_host api.akoenet.dakinissystems.com;
    set $u_finance_api_host lifeflow-production.up.railway.app;
    set $u_finance_web_host lifeflow-web-production.up.railway.app;
    set $u_fit fitness-platform-api.railway.internal;
    set $u_ai ai.railway.internal;
    # Platform scaffolds — Railway private DNS (HTTP)
    set $u_billing dakinis-billing.railway.internal;
    set $u_notifications dakinis-notifications.railway.internal;
    set $u_search dakinis-search.railway.internal;
    set $u_knowledge dakinis-knowledge.railway.internal;
    set $u_internal dakinis-internal-api.railway.internal;
    set $p_billing 4080;
    set $p_notifications 4081;
    set $p_search 4082;
    set $p_internal 4083;
    set $p_knowledge 4084;

    # SNI solo si queda algún upstream HTTPS externo (productos usan railway.internal HTTP).
    proxy_ssl_server_name on;

    location = /_auth_check {
        internal;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;

        proxy_cache auth_cache;
        proxy_cache_key $sess_or_anon_key;
        proxy_cache_bypass $auth_cache_bypass_flag;
        proxy_no_cache $auth_cache_bypass_flag;
        proxy_cache_methods GET HEAD;
        proxy_cache_valid 200 15s;
        proxy_cache_valid 401 5s;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;

        proxy_pass https://auth.dakinissystems.com/auth/verify;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host $u_auth_host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 1;
    }

    #
    # StreamAutomator — rutas públicas SIN auth_request en el gateway (superficie sin Bearer).
    # Mantener alineado con app.js (antes de authenticateToken) + /api/streamer público + webhooks + OAuth.
    #
    location ^~ /streamautomator/api/health {
        rewrite ^/streamautomator/(.*)$ /$1 break;
        proxy_pass https://api.streamautomator.com;
        proxy_http_version 1.1;
        proxy_set_header Host $u_sa_host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Integraciones: /api/integration/* (legacy) y /api/integrations/* (canónico en backend)
    location ~ ^/streamautomator/api/integration(s)?/ {
        rewrite ^/streamautomator/(.*)$ /$1 break;
        proxy_pass https://api.streamautomator.com;
        proxy_http_version 1.1;
        proxy_set_header Host $u_sa_host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /streamautomator/api/webhooks/ {
        rewrite ^/streamautomator/(.*)$ /$1 break;
        proxy_pass https://api.streamautomator.com;
        proxy_http_version 1.1;
        proxy_set_header Host $u_sa_host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /streamautomator/api/payments/webhook {
        proxy_pass https://api.streamautomator.com/api/payments/webhook;
        proxy_http_version 1.1;
        proxy_set_header Host $u_sa_host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /streamautomator/api/csrf-token {
        proxy_pass https://api.streamautomator.com/api/csrf-token;
        proxy_http_version 1.1;
        proxy_set_header Host $u_sa_host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /streamautomator/api/user/google-login {
        proxy_pass https://api.streamautomator.com/api/user/google-login;
        proxy_http_version 1.1;
        proxy_set_header Host $u_sa_host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /streamautomator/api/user/auth/ {
        rewrite ^/streamautomator/(.*)$ /$1 break;
        proxy_pass https://api.streamautomator.com;
        proxy_http_version 1.1;
        proxy_set_header Host $u_sa_host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /streamautomator/api/user/twitch/connect {
        rewrite ^/streamautomator/(.*)$ /$1 break;
        proxy_pass https://api.streamautomator.com;
        proxy_http_version 1.1;
        proxy_set_header Host $u_sa_host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /streamautomator/api/user/twitch/callback {
        rewrite ^/streamautomator/(.*)$ /$1 break;
        proxy_pass https://api.streamautomator.com;
        proxy_http_version 1.1;
        proxy_set_header Host $u_sa_host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /streamautomator/api/platforms/enabled {
        proxy_pass https://api.streamautomator.com/api/platforms/enabled;
        proxy_http_version 1.1;
        proxy_set_header Host $u_sa_host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /streamautomator/api/streamer/ {
        rewrite ^/streamautomator/(.*)$ /$1 break;
        proxy_pass https://api.streamautomator.com;
        proxy_http_version 1.1;
        proxy_set_header Host $u_sa_host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Todo lo bajo /api/public/* (incl. /api/public/streamer/* legacy)
    location ^~ /streamautomator/api/public/ {
        rewrite ^/streamautomator/(.*)$ /$1 break;
        proxy_pass https://api.streamautomator.com;
        proxy_http_version 1.1;
        proxy_set_header Host $u_sa_host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /streamautomator/api-docs {
        rewrite ^/streamautomator/(.*)$ /$1 break;
        proxy_pass https://api.streamautomator.com;
        proxy_http_version 1.1;
        proxy_set_header Host $u_sa_host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /streamautomator/admin {
        proxy_pass https://api.streamautomator.com/admin;
        proxy_http_version 1.1;
        proxy_set_header Host $u_sa_host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /streamautomator/admin/ {
        proxy_pass https://api.streamautomator.com/admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $u_sa_host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /streamautomator/ {
        proxy_pass https://api.streamautomator.com/;
        proxy_http_version 1.1;
        proxy_set_header Host $u_sa_host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Auth
    location /auth/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin '*' always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Authorization, Content-Type' always;
            add_header Access-Control-Max-Age 86400 always;
            return 204;
        }
        add_header Access-Control-Allow-Origin '*' always;
        add_header Access-Control-Allow-Headers 'Authorization, Content-Type' always;
        add_header Access-Control-Allow-Credentials 'true' always;

        proxy_pass https://auth.dakinissystems.com;
        proxy_http_version 1.1;
        proxy_set_header Host $u_auth_host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Core — health sin JWT (uptime, Postman). `=` prioridad máxima; sin auth_request.
    location = /core/api/health {
        proxy_pass https://dakinis-core-production.up.railway.app/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $u_core_host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Legacy prefix match (por si algún cliente añade query o trailing slash)
    location ^~ /core/api/health {
        rewrite ^/core/(.*)$ /$1 break;
        proxy_pass https://dakinis-core-production.up.railway.app;
        proxy_http_version 1.1;
        proxy_set_header Host $u_core_host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Core — auth y público SIN JWT (login local Core, exchange IdP, cartel alergias)
    location = /core/api/auth/login {
        proxy_pass https://dakinis-core-production.up.railway.app/api/auth/login;
        proxy_http_version 1.1;
        proxy_set_header Host $u_core_host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Content-Type $http_content_type;
    }

    location = /core/api/auth/exchange {
        proxy_pass https://dakinis-core-production.up.railway.app/api/auth/exchange;
        proxy_http_version 1.1;
        proxy_set_header Host $u_core_host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Content-Type $http_content_type;
        proxy_set_header Authorization $http_authorization;
    }

    location ^~ /core/api/public/ {
        rewrite ^/core/(.*)$ /$1 break;
        proxy_pass https://dakinis-core-production.up.railway.app;
        proxy_http_version 1.1;
        proxy_set_header Host $u_core_host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Core API (sin auth_request IdP: login y JWT son del propio Core iss=dakinis-core)
    # Core valida Bearer + x-business-id en Node. IdP /auth/verify no aplica a esos tokens.
    location /core/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin '*' always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Authorization, Content-Type, X-Business-Id, x-business-id' always;
            add_header Access-Control-Max-Age 86400 always;
            return 204;
        }
        add_header Access-Control-Allow-Origin '*' always;
        add_header Access-Control-Allow-Headers 'Authorization, Content-Type, X-Business-Id, x-business-id' always;
        add_header Access-Control-Allow-Credentials 'true' always;

        limit_req zone=api_limit burst=20 nodelay;

        rewrite ^/core/(.*)$ /$1 break;
        proxy_pass https://dakinis-core-production.up.railway.app;
        proxy_http_version 1.1;
        proxy_set_header Host $u_core_host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Business-Id $http_x_business_id;
    }

    # --- StreamAutomator (resto del API: JWT en el borde + identidad + rate limit)
    location /streamautomator/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin '*' always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Authorization, Content-Type, X-Tenant-Id' always;
            add_header Access-Control-Max-Age 86400 always;
            return 204;
        }
        add_header Access-Control-Allow-Origin '*' always;
        add_header Access-Control-Allow-Headers 'Authorization, Content-Type, X-Tenant-Id' always;
        add_header Access-Control-Allow-Credentials 'true' always;

        limit_req zone=api_limit burst=20 nodelay;

        auth_request /_auth_check;
        auth_request_set $auth_user $upstream_http_x_user_id;
        auth_request_set $auth_tenant $upstream_http_x_tenant_id;
        auth_request_set $auth_role $upstream_http_x_user_role;

        rewrite ^/streamautomator/(.*)$ /$1 break;
        proxy_pass https://api.streamautomator.com;
        proxy_http_version 1.1;
        proxy_set_header Host $u_sa_host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-User-Id $auth_user;
        proxy_set_header X-Tenant-Id $auth_tenant;
        proxy_set_header X-User-Role $auth_role;
    }

    # --- Dakinis Finanzas (LifeFlow) — API bajo /finance/api/, health en /finance/health
    location = /finance/health {
        proxy_pass https://lifeflow-production.up.railway.app/health;
        proxy_http_version 1.1;
        proxy_set_header Host $u_finance_api_host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /finance/api/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin '*' always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Authorization, Content-Type' always;
            add_header Access-Control-Max-Age 86400 always;
            return 204;
        }
        add_header Access-Control-Allow-Origin '*' always;
        add_header Access-Control-Allow-Headers 'Authorization, Content-Type' always;
        add_header Access-Control-Allow-Credentials 'true' always;

        limit_req zone=api_limit burst=20 nodelay;

        rewrite ^/finance/(api/.*)$ /$1 break;
        proxy_pass https://lifeflow-production.up.railway.app;
        proxy_http_version 1.1;
        proxy_set_header Host $u_finance_api_host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    # Hub tile / proxy transparente → SPA (finance.dakinissystems.com)
    location ^~ /finance/ {
        proxy_pass https://lifeflow-web-production.up.railway.app;
        proxy_http_version 1.1;
        proxy_set_header Host $u_finance_web_host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /akoenet/docs {
        return 302 /akoenet/docs/;
    }

    # AkoeNet Socket.IO en raíz del gateway (clientes legacy: socket.io-client ignora el path de VITE_API_URL).
    location ^~ /socket.io/ {
        proxy_pass https://api.akoenet.dakinissystems.com;
        proxy_http_version 1.1;
        proxy_set_header Host $u_an_host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_connect_timeout 10s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
    }

    # AkoeNet — health sin auth (uptime, smoke tests)
    location ^~ /akoenet/health {
        rewrite ^/akoenet/(.*)$ /$1 break;
        proxy_pass https://api.akoenet.dakinissystems.com;
        proxy_http_version 1.1;
        proxy_set_header Host $u_an_host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # AkoeNet: CORS lo resuelve akoenet-backend (origen explícito + credentials).
    # No añadir Access-Control-* aquí: duplicar cabeceras con el upstream hace que el navegador
    # marque 200 en rojo y falle fetch (p. ej. /auth/twitch/status, /auth/me).
    location /akoenet/ {
        rewrite ^/akoenet/(.*)$ /$1 break;
        proxy_pass https://api.akoenet.dakinissystems.com;
        proxy_http_version 1.1;
        proxy_set_header Host $u_an_host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        # Socket.IO / voice: conexiones largas (el default global de 5s corta websockets).
        proxy_connect_timeout 10s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
    }

    # Fitness Platform — demo JWT en la app (sin auth_request aquí); ver docs/contracts/fitness-platform-api.json
    location ^~ /fitness/api/health {
        rewrite ^/fitness/(.*)$ /$1 break;
        proxy_pass http://$u_fit:4010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /fitness/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin '*' always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Authorization, Content-Type' always;
            add_header Access-Control-Max-Age 86400 always;
            return 204;
        }
        add_header Access-Control-Allow-Origin '*' always;
        add_header Access-Control-Allow-Headers 'Authorization, Content-Type' always;
        add_header Access-Control-Allow-Credentials 'true' always;

        rewrite ^/fitness/(.*)$ /$1 break;
        proxy_pass http://$u_fit:4010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Dakinis AI Platform — service key en Authorization (server-to-server desde productos)
    location ^~ /ai/health {
        rewrite ^/ai/(.*)$ /$1 break;
        proxy_pass http://$u_ai:4020;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ai/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin '*' always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Authorization, Content-Type, X-Dakinis-Product, X-Dakinis-User-Id' always;
            add_header Access-Control-Max-Age 86400 always;
            return 204;
        }
        add_header Access-Control-Allow-Origin '*' always;
        add_header Access-Control-Allow-Headers 'Authorization, Content-Type, X-Dakinis-Product, X-Dakinis-User-Id' always;

        rewrite ^/ai/(.*)$ /$1 break;
        proxy_pass http://$u_ai:4020;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
