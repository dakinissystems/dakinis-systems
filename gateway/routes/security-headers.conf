# Cabeceras de seguridad en respuestas del Gateway.
# Incluido en el server {} de default.conf.
# Nota nginx: si un location redefine add_header, debe volver a incluir este fichero
# (los add_header del server no se heredan). Cloudflare debería duplicar estas
# cabeceras en el edge para cobertura total (ver docs/SECURITY-OPS.md).

add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
add_header Cross-Origin-Resource-Policy "cross-origin" always;
