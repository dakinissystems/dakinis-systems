# Dakinis API gateway — Nginx entry (Alpine image).
# Mount as /etc/nginx/nginx.conf. Route snippets live in routes/ (→ /etc/nginx/routes/).

user  nginx;
worker_processes  auto;
error_log  /dev/stderr notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Cache para subrequests auth_request → /auth/verify
    proxy_cache_path /var/cache/nginx/auth levels=1:2 keys_zone=auth_cache:10m max_size=50m inactive=60s use_temp_path=off;

    map $http_authorization $gateway_auth_hint {
        default "present";
        ""      "absent";
    }

    # Huella corta del Bearer (primeros 48 chars del payload JWT). Patrón entre comillas: {} en regex requiere quotes en map.
    map $http_authorization $sess_or_anon_key {
        "~^Bearer\s+(.{48})" sess:$1;
        default             "anon:$binary_remote_addr";
    }

    map $http_authorization $auth_cache_bypass_flag {
        default 0;
        ""      1;
    }

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    # user=/tenant= vienen de auth_request_set en locations con auth (vacío en el resto).
    log_format gateway_main '$request_id $remote_addr user=$auth_user tenant=$auth_tenant '
                    '"$request" $status $body_bytes_sent '
                    'rt=$request_time urt=$upstream_response_time ust=$upstream_status '
                    'auth=$gateway_auth_hint';

    access_log /dev/stdout gateway_main;

    sendfile        on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    # Compress JSON/API and static text — biggest TTFB win for Hub/BFF payloads.
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    limit_req_zone $sess_or_anon_key zone=api_limit:10m rate=10r/s;
    # Granular zones (Fase B/C) — public stricter; BFF higher; admin/events dedicated
    limit_req_zone $binary_remote_addr zone=public_limit:10m rate=5r/s;
    limit_req_zone $sess_or_anon_key zone=bff_limit:10m rate=30r/s;
    limit_req_zone $sess_or_anon_key zone=admin_limit:10m rate=10r/s;
    limit_req_zone $sess_or_anon_key zone=events_limit:10m rate=20r/s;

    limit_req_status 429;

    include /etc/nginx/routes/*.conf;
}
